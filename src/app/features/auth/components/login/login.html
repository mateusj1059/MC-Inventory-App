<div class="auth-container">
  <div class="auth-card">
    <div class="grass-strip"></div>
    <div class="dirt-strip"></div>
    <h1>Bienvenido</h1>
    <p>Ingresa o crea tu cuenta</p>
    <div class="tabs">
      <button class="tab" [class.active]="activeTab === 'login'" (click)="activeTab = 'login'">Login</button>
      <button class="tab" [class.active]="activeTab === 'registro'" (click)="activeTab = 'registro'">Registro</button>
    </div>
    <div class="auth-form">
      <div class="form-group">
        <label for="user">Usuario</label>
        <input [(ngModel)]="user" id="user" type="text" placeholder="Ingresa tu usuario" name="user" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input [(ngModel)]="password" id="password" type="password" placeholder="Ingresa tu contraseña" name="password" />
      </div>
      <div class="error-block" *ngIf="error">
        ⚠ {{ error }}
      </div>
      <button type="button" class="submit-btn" (click)="sendLogin()">Ingresar</button>
    </div>
  </div>
</div>
